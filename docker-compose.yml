version: '3.8'

# ============================================================
# docker-compose.yml — Frontend (Flask)
# Ejecutar solo el servicio de Frontend de forma independiente
# Uso: docker-compose up --build
# ============================================================

services:

  frontend:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: proyecto_frontend
    restart: unless-stopped
    environment:
      PORT: 5000
      DEBUG: "False"
      # URL del Backend API (ajustar si el backend corre en otro host)
      BACKEND_URL: ${BACKEND_URL:-http://localhost:3000}
      SECRET_KEY: ${SECRET_KEY:-clave_secreta_cambiar_en_produccion}
    ports:
      # Solo el Frontend es accesible desde Internet (puerto 80)
      - "80:5000"
    networks:
      - red_frontend

networks:
  red_frontend:
    driver: bridge
